name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # CPU-heavy property sweeps can block vitest's worker long enough that its
      # "onTaskUpdate" RPC to main times out on a constrained runner (all tests
      # pass, run still exits non-zero). Mitigate three ways: run test files
      # serially, use the quiet 'dot' reporter (far less RPC chatter), and let
      # testUtils drop to 60 seeds under CI (still thorough).
      - run: npm test -- --no-file-parallelism --reporter=dot
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
